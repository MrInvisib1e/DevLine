name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Node tests
        run: node --test tests/installer/*.test.mjs
      - uses: bats-core/bats-action@4.0.0
      - name: Run bats tests
        # tests/*.bats only — archived tests in subdirectories are excluded intentionally
        run: bats tests/*.bats

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish
        run: npm publish --provenance --access public
