name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Node tests
        run: node --test tests/installer/*.test.mjs
      - uses: bats-core/bats-action@2.0.0
      - name: Run bats tests
        # tests/*.bats only — archived tests in subdirectories are excluded intentionally
        run: bats tests/*.bats
