name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Run Node tests
        run: node --test tests/installer/*.test.mjs
      - name: Install bats
        run: sudo apt-get install -y bats
      - name: Run bats tests
        run: bats tests/*.bats
